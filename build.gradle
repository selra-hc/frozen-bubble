plugins {
  id 'com.android.application' version '8.5.2'
}

def enableNativeBuild =
    !providers.gradleProperty("skipNativeBuild")
      .map { it.toBoolean() }
      .getOrElse(false)

android {
  namespace 'org.jfedor.frozenbubble'
  compileSdk 35

  defaultConfig {
    applicationId 'org.jfedor.frozenbubble'
    minSdk 21
    targetSdk 35
    versionCode 54
    versionName '4.4'

    ndk {
      abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'
    }
  }

  sourceSets {
    main {
      manifest.srcFile 'AndroidManifest.xml'
      java.srcDirs = ['src']
      res.srcDirs = ['res']
      assets.srcDirs = ['assets']
      jniLibs.srcDirs = ['libs']
    }
  }

  if (enableNativeBuild) {
    externalNativeBuild {
      ndkBuild {
        path file('jni/Android.mk')
      }
    }
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }

  lint {
    abortOnError false
  }
}

dependencies {
}
